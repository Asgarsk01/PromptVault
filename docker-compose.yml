version: "3.9"

services:

  db:
    image: postgres:15
    container_name: promptvault_db
    restart: always
    environment:
      POSTGRES_DB: promptvault
      POSTGRES_USER: promptvault_user
      POSTGRES_PASSWORD: promptvault_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: promptvault_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promptvault_backend
    restart: always
    environment:
      DB_NAME: promptvault
      DB_USER: promptvault_user
      DB_PASSWORD: promptvault_pass
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      DEBUG: "True"
      SECRET_KEY: super-secret-key-change-in-production
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promptvault_frontend
    restart: always
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
